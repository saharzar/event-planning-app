<div class="modal fade show d-block" tabindex="-1" role="dialog" aria-modal="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0 pb-0">
        <h2 class="modal-title h5 fw-bold">{{ title() }}</h2>
        <button type="button" class="btn-close" (click)="cancel()" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-secondary mb-0">{{ message() }}</p>
      </div>
      <div class="modal-footer border-0 pt-0 gap-2">
        <button type="button" class="btn btn-outline-soft" (click)="cancel()">{{ cancelLabel() }}</button>
        <button
          type="button"
          class="btn"
          [class.btn-danger]="danger()"
          [class.btn-gradient]="!danger()"
          (click)="confirm()"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" (click)="cancel()"></div>
