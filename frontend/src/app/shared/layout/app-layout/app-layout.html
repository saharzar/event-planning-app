<div class="app-shell">
  <aside class="app-sidebar pt-3" [class.show]="sidebarOpen()">
    <nav class="sidebar-nav px-2 flex-grow-1">
      @for (item of navItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="sidebar-link"
          (click)="closeSidebar()"
        >
          <i [class]="'bi ' + item.icon"></i>
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>

  @if (sidebarOpen()) {
    <div class="sidebar-backdrop d-lg-none" (click)="closeSidebar()"></div>
  }

  <div class="app-main">
    <header class="app-topbar d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <button type="button" class="btn btn-light border d-lg-none" (click)="toggleSidebar()" aria-label="Menu">
          <i class="bi bi-list"></i>
        </button>
        <a routerLink="/" class="sidebar-brand app-topbar-brand d-flex align-items-center gap-2 text-decoration-none">
          <span class="brand-icon"><i class="bi bi-calendar-event-fill"></i></span>
          <span class="brand-text fw-bold d-none d-sm-inline">Evently</span>
        </a>
      </div>
      <div class="d-flex align-items-center gap-2 gap-md-3">
        @if (currentUser(); as user) {
          <span class="topbar-user smaller d-none d-md-inline">Hi, <strong>{{ user.fullName }}</strong></span>
        }
        <a routerLink="/create-event" class="btn btn-gradient btn-sm d-none d-sm-inline-flex">
          <i class="bi bi-plus-lg me-1"></i> New Event
        </a>
        <button type="button" class="btn btn-ghost btn-sm" (click)="requestLogout()">Logout</button>
      </div>
    </header>
    <main class="app-content">
      <router-outlet />
    </main>
  </div>
</div>

@if (showLogoutConfirm()) {
  <app-confirm-modal
    title="Log out?"
    message="Are you sure you want to log out of your account?"
    confirmLabel="Log out"
    [danger]="true"
    (confirmed)="confirmLogout()"
    (cancelled)="cancelLogout()"
  />
}
