<app-hero />

<section class="features-section section-padding" appFadeIn>
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="section-title fw-black tracking-tight mb-2">Everything you need to run great events</h2>
      <p class="section-subtitle mx-auto">Powerful tools for organizers and a seamless experience for attendees.</p>
    </div>
    <div class="row g-4">
      @for (feature of features(); track feature.id) {
        <div class="col-sm-6 col-lg-3">
          <app-feature-card [feature]="feature" />
        </div>
      }
    </div>
  </div>
</section>

<app-stats [items]="stats()" />

<app-cta-banner />
