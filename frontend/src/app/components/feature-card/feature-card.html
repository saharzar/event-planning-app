<div class="feature-card card-soft card-lift text-center h-100 p-4 p-lg-5">
  <div class="icon-circle mx-auto mb-3" [class]="feature().iconClass">
    <i [class]="feature().icon"></i>
  </div>
  <h3 class="feature-title fw-bold mb-2">{{ feature().title }}</h3>
  <p class="feature-desc mb-0">{{ feature().description }}</p>
</div>
