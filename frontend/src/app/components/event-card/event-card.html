<article class="event-card card-soft card-lift h-100 d-flex flex-column">
  <div class="event-image-wrap position-relative">
    <img [src]="event().image" [alt]="event().title" class="event-image w-100" loading="lazy" />
    <div class="date-badge">
      <span class="date-month">{{ event().month }}</span>
      <span class="date-day">{{ event().day }}</span>
    </div>
  </div>
  <div class="event-body p-4 flex-grow-1 d-flex flex-column">
    <h3 class="event-title fw-bold mb-3">{{ event().title }}</h3>
    <ul class="event-meta list-unstyled mb-3">
      <li>
        <i class="bi bi-calendar3 me-2"></i>
        {{ event().date }}
      </li>
      <li>
        <i class="bi bi-clock me-2"></i>
        {{ event().time }}
      </li>
      <li>
        <i class="bi bi-geo-alt me-2"></i>
        {{ event().location }}
      </li>
    </ul>
    <span class="category-tag mb-3" [class]="tagClass()">{{ event().category }}</span>
    <button type="button" class="btn btn-outline-soft w-100 mt-auto">View Details</button>
  </div>
</article>
